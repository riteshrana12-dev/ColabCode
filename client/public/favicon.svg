<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Vibrant Indigo to Cyan Developer Gradient -->
    <linearGradient id="colabGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" /> 
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
  </defs>
  
  <!-- Smooth rounded dark container -->
  <rect width="512" height="512" rx="128" fill="#0F172A" />
  
  <!-- Left Bracket < -->
  <path d="M 180 150 L 80 256 L 180 362" fill="none" stroke="url(#colabGrad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Right Bracket > -->
  <path d="M 332 150 L 432 256 L 332 362" fill="none" stroke="url(#colabGrad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Collaborative Connection/Slash Line -->
  <line x1="285" y1="130" x2="227" y2="382" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round" opacity="0.9" />

  <!-- Collaborative Multiplayer Cursor Dot -->
  <circle cx="256" cy="256" r="32" fill="#06B6D4" />
  <circle cx="256" cy="256" r="48" fill="none" stroke="#06B6D4" stroke-width="6" opacity="0.5" />
</svg>
